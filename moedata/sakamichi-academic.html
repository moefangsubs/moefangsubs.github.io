<body>
    <div class="contentpage container">
        <div class="titlehead">
            <h1>Sakamichi Academic Year</h1>
        </div>
        <div class="justify intro-text">
            Halaman ini mengelompokkan member aktif Sakamichi Series dan BokuAo berdasarkan tahun akademik Jepang (2 April - 1 April tahun berikutnya).
        </div>

        <div class="controls-container">
            <div class="filter-group">
                <label>Grup:</label>
                <select id="filter-group">
                    <option value="all">Semua Grup</option>
                    <option value="nogi">Nogizaka46</option>
                    <option value="saku">Sakurazaka46</option>
                    <option value="hina">Hinatazaka46</option>
                    <option value="boku">BokuAo</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label>Tampilan:</label>
                <select id="display-mode">
                    <option value="mode-photo">Foto Saja</option>
                    <option value="mode-photo-name">Foto & Nama</option>
                    <option value="mode-name">Nama Saja</option>
                </select>
            </div>
        </div>

        <div id="academic-container"></div>
        
        <div class="rectangle"></div>
    </div>
