<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting... | MoeFang Subs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* ---------------------------------- */
        /* Page Styling                       */
        /* ---------------------------------- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
		body {
			background-color: var(--moe);
			color: var(--moe-tint7);
			display: flex;
			justify-content: center;
			align-items: center;
			min-height: 100vh;
			padding: 1rem;
		}
		.redirect-container {
			text-align: center;
			max-width: 600px;
			width: 100%;
			background: var(--moe-shade-max1);
			padding: 1.5rem;
			box-shadow: 10px 10px 6px #2e0052;
		}
		.title-text {
			font-size: 1.8rem;
			font-weight: 900;
			line-height: 1.4;
		}
        .show-title {
            color: #6c5ce7;
        }
		.countdown-number {
			font-family: 'Space Mono', monospace;
			font-size: 6rem;
			font-weight: 700;
			margin: 0;
		}
        .trakteer-link {
            font-size: 1rem;
            margin: 1.5rem 0;
            display: none;
        }
        .trakteer-link a {
            color: #ff4757;
            text-decoration: underline;
            font-weight: 700;
        }
        .fallback-link {
            font-size: 0.95rem;
            opacity: 0.8;
            display: none;
        }
        .fallback-link a {
            color: #6c5ce7;
            text-decoration: underline;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="redirect-container">
        <h1 class="title-text">
            Lagi diarahkan ke tautan shortlink<br>
            <span id="target-title" class="show-title">Garapan</span>
        </h1>
        
        <div id="countdown" class="countdown-number">5</div>

        <p id="trakteer-skip" class="trakteer-link">
            Ga suka nunggu? <a id="trakteer-download" href="#" target="_blank" rel="noopener noreferrer">Silakan Trakteer aja</a>, sambil dukung atminnya ☺️
        </p>
        
        <p class="fallback-link">
            Jika tidak diarahkan otomatis, <a id="direct-download" href="#">klik di sini</a>.
        </p>
    </div>

    <script>
        /* ---------------------------------- */
        /* Script Logic                       */
        /* ---------------------------------- */
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const destination = params.get('to');
            const title = params.get('title');
            const trakteerUrl = params.get('trakteer');

            if (!destination) {
                document.body.innerHTML = '<h1>Error: Link tujuan tidak ditemukan.</h1>';
                return;
            }

            if (title) {
                document.getElementById('target-title').textContent = `"${title}"`;
            }

            const fallback = document.getElementById('direct-download');
            fallback.href = destination;

            if (trakteerUrl) {
                const trakteerLinkContainer = document.getElementById('trakteer-skip');
                const trakteerAnchor = document.getElementById('trakteer-download');
                if (trakteerLinkContainer && trakteerAnchor) {
                    trakteerAnchor.href = trakteerUrl;
                    trakteerLinkContainer.style.display = 'block';
                }
            }

            const fallbackElement = document.querySelector('.fallback-link');
            let counter = 5;
            const display = document.getElementById('countdown');

            const timer = setInterval(() => {
                counter--;
                display.textContent = counter;

                if (counter <= 0) {
                    clearInterval(timer);
                    window.location.href = destination;

                    setTimeout(() => {
                        if (fallbackElement) {
                            fallbackElement.style.display = 'block';
                        }
                    }, 2000);
                }
            }, 1000);
        });
    </script>
</body>
</html>
